<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>week3</title>
</head>
<body >
    <div id="overlay" class="overlay"></div>
    <div id="sidebar" class="sidebar">
        <button id="sidebar-btn" onclick= exitToggle()>
            <span>X</span>
        </button>
        <ul id="sidebar-menu">
            <li class="sidebar-menu-items"><a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">Item1</a></li>
            <li class="sidebar-menu-items"><a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">Item2</a></li>
            <li class="sidebar-menu-items"><a href="https://www.youtube.com/watch?v=RZ_0ImDYrPY">Item3</a></li>
            <li class="sidebar-menu-items"><a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">Item4</a></li>
        </ul>
    </div>
    <nav>
        <span id="logo">My Website</span>

        <button id="burger-bt">
            <img  class="burger" src="options.png" alt=""> 
        </button>
        <ul id="menu">
            <li class="menu-items"><a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">Item1</a></li>
            <li class="menu-items"><a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">Item2</a></li>
            <li class="menu-items"><a href="https://www.youtube.com/watch?v=RZ_0ImDYrPY">Item3</a></li>
            <li class="menu-items"><a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">Item4</a></li>
        </ul>
    </nav>
    <header>
        <span>Welcome to MyHome</span>
    </header>
    <main>
        <section id="promotion-section" class="promotion-section">
        </section >
        <section  id="content-section" class="content-section">
        </section >
        <section id ="bottom-bar">
            <button id="more-bt" >Load More</button>
        </section>  
    </main>
    
    <script type="module">
    import {load,main} from "./task3.js"
    const mediaQuery = window.matchMedia('(min-width: 600px)');
    function handleTabletChange(e) {
        if (e.matches) {
            exitToggle();
        }
    }
    main();
    mediaQuery.addEventListener('change', handleTabletChange);

    document.getElementById("burger-bt").addEventListener("click",burgerToggle);
    document.getElementById("sidebar-btn").addEventListener("click",exitToggle);
    document.getElementById("overlay").addEventListener("click",exitToggle);
    document.getElementById("more-bt").addEventListener("click",loadMore);

    function burgerToggle(){
        let overlay = document.getElementById("overlay");
        let sidebar = document.getElementById("sidebar");
        overlay.classList.add("active");
        sidebar.classList.add("active");
    }
    function exitToggle(){
        let overlay = document.getElementById("overlay");
        let sidebar = document.getElementById("sidebar");
        sidebar.classList.remove("active");
        overlay.classList.remove("active");

    }
    function loadMore(){
        load(13);
    }
    </script>
</body>
</html>
